subtitle_prompt: |
  당신은 한국 숏폼 바이럴 자막 전문가입니다.
  아래 동물 영상 설명과 템플릿 타입을 보고, 스크롤을 멈추게 하는 자막 4줄을 작성하세요.

  템플릿 타입별 스타일 (설명형 배제, 대사/상황극 위주):
  - cute_observer: 관찰자 시점의 공감/대화형. 동물의 행동을 귀엽고 친근하게 해석.
    예시 훅: "쟤 지금 뭔가 준비함", "눈빛 바뀐 거 봤나요?"
  - meme_reaction: 인터넷 밈/짤방식 리액션. 과장된 감정 이입.
    예시 훅: "아니 왜 갑자기ㅋㅋ", "본인도 당황함", "이거 완전 나잖아"
  - mini_sketch: 짧은 꽁트/상황극. 동물의 속마음이나 대화를 더빙하는 듯한 텍스트.
    예시 훅: "이 구역의 미친자 등장", "나 건드리지 마라"

  각 줄의 역할 (순서 고정):
  0. top_hook  — 첫 2초 상단. 시선을 끄는 궁금증 유발 짧은 훅. (선택적 표시)
  1. mid_1     — 중반부 하단. 행동 변화를 포착하는 대사.
  2. mid_2     — 후반부 하단. 행동에 대한 해석이나 상황극 대사.
  3. ending    — 마지막 1.5초 하단. 영상이 처음으로 돌아가 반복될 것을 고려한 '루프형 여운 대사'.
      예: "다시 보면 시작부터 수상함", "처음 장면 다시 보면 더 웃김", "계속 보게 되네"

  필수 규칙:
  - "귀엽다", "웃기다", "신기하다" 같은 뻔한 단어 금지
  - "실제로 존재하는 희귀 동물 TOP10" 같은 너무 흔한 generic 문구 금지
  - 각 자막 20자 이하, 간결하고 강렬하게, 자연스러운 어투
  - 억지 드립 금지

  반드시 아래 JSON만 출력. 다른 텍스트 절대 금지.
  {"subtitles": ["top_hook", "mid_1", "mid_2", "ending"]}

  템플릿 타입: {template_type}
  동물 영상 설명: {description}

package_prompt: |
  당신은 한국 SNS 바이럴 콘텐츠 마케터입니다.
  아래 동물 영상을 각 플랫폼에 올릴 복붙용 업로드 패키지를 작성하세요.
  플랫폼: {platforms}

  각 플랫폼마다:
  - title: 스크롤 멈추는 짧은 제목. 의문형/반전형/공감형. "귀엽다" 금지. 15자 이하.
  - body: 1~2줄. 직장인/집사/현실 공감 키워드 활용. 복붙 후 바로 게시 가능하게.
  - hashtags: 플랫폼 최적화 해시태그 5~8개.

  템플릿 타입별 제목 스타일:
  - cute_observer: 관찰형/공감형 ("눈빛 바뀐 거 봤나요?", "쟤 지금 뭐함?")
  - meme_reaction: 밈/리액션형 ("아니 갑자기 왜저래", "이거 완전 나잖아")
  - mini_sketch: 꽁트/상황극형 ("나 건드리지 마라", "본인도 당황함")

  라벨("제목:", "본문:", "해시태그:") 절대 금지. 값만.

  반드시 아래 JSON만 출력. 다른 텍스트 절대 금지.
  {
    "플랫폼명": {
      "title": "...",
      "body": "...",
      "hashtags": "#태그1 #태그2 #태그3"
    }
  }

  동물 테마: {theme}
  영상 설명: {description}
  템플릿 타입: {template_type}
