# ── Template 1: cute_observer (기본값) ─────────────────────────────────────────
cute_observer:
  colors:
    hook_text:   "yellow"
    caption_text: "white"
    ending_text:  "white"
    hook_bg:      [18, 18, 28]
    caption_bg:   [18, 18, 28]
    ending_bg:    [110, 42, 0]
    accent:       [205, 175, 90]
    progress:     [205, 175, 90]
    keyword_hl:   [255, 210, 60]

  layout:
    hook:
      h:          156
      font_size:  66
      alpha:      0.80
      radius:     0
      stroke:     3
    caption:
      h:          164
      bottom_margin: 96
      inset_x:    24
      font_size:  64
      alpha:      0.76
      radius:     18
      stroke:     3
    ending:
      h:          188
      font_size:  74
      alpha:      0.84
      radius:     18
      stroke:     4
    accent_h:     4
    progress_h:   8
    progress_bottom: 14

  beats:
    - [1.00,  0.00]
    - [1.15, -0.05]
    - [1.25,  0.08]
    - [1.10,  0.00]

  pattern_interrupt:
    enabled:      true
    zoom_start:   1.09
    settle_time:  0.42

  vignette_strength: 0.50

  timing:
    hook_slam:    0.08
    caption_fade: 0.20
    global_fade_in:  0.30
    global_fade_out: 0.42

  subtitle_style: cute_observer


